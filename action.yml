name: "Snyk SCA Scan Analysis"
description: "Composite action that reads snyk.json from the current directory, analyzes severities and SLA breaches, and posts a PR comment"
inputs:
  MAX_CRITICAL_ISSUES:
    description: 'Maximum allowed critical issues (with fixes)'
    required: false
    default: '10'
  MAX_HIGH_ISSUES:
    description: 'Maximum allowed high issues (with fixes)'
    required: false
    default: '25'
  MAX_MEDIUM_ISSUES:
    description: 'Maximum allowed medium issues (with fixes)'
    required: false
    default: '500'
  MAX_LOW_ISSUES:
    description: 'Maximum allowed low issues (with fixes)'
    required: false
    default: '1000'
  SLA_CRITICAL_WITH_FIX:
    description: 'SLA days for critical vulnerabilities with fixes'
    required: false
    default: '15'
  SLA_HIGH_WITH_FIX:
    description: 'SLA days for high vulnerabilities with fixes'
    required: false
    default: '30'
  SLA_MEDIUM_WITH_FIX:
    description: 'SLA days for medium vulnerabilities with fixes'
    required: false
    default: '90'
  SLA_LOW_WITH_FIX:
    description: 'SLA days for low vulnerabilities with fixes'
    required: false
    default: '180'
  SLA_CRITICAL_NO_FIX:
    description: 'SLA days for critical vulnerabilities without fixes'
    required: false
    default: '30'
  SLA_HIGH_NO_FIX:
    description: 'SLA days for high vulnerabilities without fixes'
    required: false
    default: '120'
  SLA_MEDIUM_NO_FIX:
    description: 'SLA days for medium vulnerabilities without fixes'
    required: false
    default: '365'
  SLA_LOW_NO_FIX:
    description: 'SLA days for low vulnerabilities without fixes'
    required: false
    default: '365'

outputs:
  fail_build:
    description: 'true if any thresholds or SLAs were breached for issues with available fixes'
    value: ${{ steps.snyk_analysis.outputs.fail_build }}
  warn_build:
    description: 'true if SLA breaches detected for issues without available fixes'
    value: ${{ steps.snyk_analysis.outputs.warn_build }}

runs:
  using: "composite"
  steps:
    - name: Run Snyk SCA analysis
      id: snyk_analysis
      shell: bash
      env:
        MAX_CRITICAL_ISSUES: ${{ inputs.MAX_CRITICAL_ISSUES }}
        MAX_HIGH_ISSUES: ${{ inputs.MAX_HIGH_ISSUES }}
        MAX_MEDIUM_ISSUES: ${{ inputs.MAX_MEDIUM_ISSUES }}
        MAX_LOW_ISSUES: ${{ inputs.MAX_LOW_ISSUES }}
        SLA_CRITICAL_WITH_FIX: ${{ inputs.SLA_CRITICAL_WITH_FIX }}
        SLA_HIGH_WITH_FIX: ${{ inputs.SLA_HIGH_WITH_FIX }}
        SLA_MEDIUM_WITH_FIX: ${{ inputs.SLA_MEDIUM_WITH_FIX }}
        SLA_LOW_WITH_FIX: ${{ inputs.SLA_LOW_WITH_FIX }}
        SLA_CRITICAL_NO_FIX: ${{ inputs.SLA_CRITICAL_NO_FIX }}
        SLA_HIGH_NO_FIX: ${{ inputs.SLA_HIGH_NO_FIX }}
        SLA_MEDIUM_NO_FIX: ${{ inputs.SLA_MEDIUM_NO_FIX }}
        SLA_LOW_NO_FIX: ${{ inputs.SLA_LOW_NO_FIX }}
      run: bash ${{ github.action_path }}/snyk-parser.sh

    - name: Comment PR with Security Scan Results
      if: ${{ always() && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const criticalCount = process.env.critical_count || '0';
          const criticalNoFix = process.env.critical_no_fix || '0';
          const highCount = process.env.high_count || '0';
          const highNoFix = process.env.high_no_fix || '0';
          const mediumCount = process.env.medium_count || '0';
          const mediumNoFix = process.env.medium_no_fix || '0';
          const lowCount = process.env.low_count || '0';
          const lowNoFix = process.env.low_no_fix || '0';
          const maxCritical = process.env.MAX_CRITICAL_ISSUES || '10';
          const maxHigh = process.env.MAX_HIGH_ISSUES || '25';
          const maxMedium = process.env.MAX_MEDIUM_ISSUES || '0';
          const maxLow = process.env.MAX_LOW_ISSUES || '0';
          const failBuild = process.env.fail_build || 'false';
          const warnBuild = process.env.warn_build || 'false';

          // SLA breach counts
          const criticalSla = process.env.critical_sla_breaches || '0';
          const criticalSlaNoFix = process.env.critical_sla_breaches_no_fix || '0';
          const highSla = process.env.high_sla_breaches || '0';
          const highSlaNoFix = process.env.high_sla_breaches_no_fix || '0';
          const mediumSla = process.env.medium_sla_breaches || '0';
          const mediumSlaNoFix = process.env.medium_sla_breaches_no_fix || '0';
          const lowSla = process.env.low_sla_breaches || '0';
          const lowSlaNoFix = process.env.low_sla_breaches_no_fix || '0';

          // SLA thresholds
          const slaCriticalWithFix = process.env.SLA_CRITICAL_WITH_FIX || '15';
          const slaCriticalNoFix = process.env.SLA_CRITICAL_NO_FIX || '30';
          const slaHighWithFix = process.env.SLA_HIGH_WITH_FIX || '30';
          const slaHighNoFix = process.env.SLA_HIGH_NO_FIX || '120';
          const slaMediumWithFix = process.env.SLA_MEDIUM_WITH_FIX || '90';
          const slaMediumNoFix = process.env.SLA_MEDIUM_NO_FIX || '365';
          const slaLowWithFix = process.env.SLA_LOW_WITH_FIX || '180';
          const slaLowNoFix = process.env.SLA_LOW_NO_FIX || '365';

          const criticalStatus = parseInt(criticalCount) > parseInt(maxCritical) ? '❌ Failed' : '✅ Passed';
          const highStatus = parseInt(highCount) > parseInt(maxHigh) ? '❌ Failed' : '✅ Passed';
          const mediumStatus = parseInt(mediumCount) > parseInt(maxMedium) ? '❌ Failed' : '✅ Passed';
          const lowStatus = parseInt(lowCount) > parseInt(maxLow) ? '❌ Failed' : '✅ Passed';

          let comment = '### 🔒 Security Scan Results\n\n';
          comment += '> ℹ️ Note: Only vulnerabilities with available fixes (upgrades or patches) are counted toward thresholds.\n\n';
          comment += '| Check Type | Count (with fixes) | Without fixes | Threshold | Result |\n';
          comment += '|------------|-------------------|---------------|-----------|--------|\n';
          comment += `| 🔴 Critical Severity | ${criticalCount} | ${criticalNoFix} | ${maxCritical} | ${criticalStatus} |\n`;
          comment += `| 🟠 High Severity | ${highCount} | ${highNoFix} | ${maxHigh} | ${highStatus} |\n`;
          comment += `| 🟡 Medium Severity | ${mediumCount} | ${mediumNoFix} | ${maxMedium} | ${mediumStatus} |\n`;
          comment += `| 🔵 Low Severity | ${lowCount} | ${lowNoFix} | ${maxLow} | ${lowStatus} |\n\n`;

          const totalSlaBreaches = parseInt(criticalSla) + parseInt(criticalSlaNoFix) + 
                                   parseInt(highSla) + parseInt(highSlaNoFix) +
                                   parseInt(mediumSla) + parseInt(mediumSlaNoFix) +
                                   parseInt(lowSla) + parseInt(lowSlaNoFix);

          comment += '### ⏱️ SLA Breach Summary\n\n';
          if (totalSlaBreaches > 0) {
            comment += '> ⚠️ Warning: The following vulnerabilities have exceeded their SLA thresholds (days since publication).\n\n';
          } else {
            comment += '> ✅ No SLA breaches detected. All vulnerabilities are within acceptable time thresholds.\n\n';
          }
          comment += '| Severity | Breaches (with fixes) | Breaches (no fixes) | SLA Threshold (with/no fixes) | Status |\n';
          comment += '|----------|----------------------|---------------------|------------------------------|--------|\n';

          function slaStatus(withFix, noFix) {
            const wf = parseInt(withFix), nf = parseInt(noFix);
            if (wf > 0 && nf > 0) return '❌ Failed / ⚠️ Warning';
            if (wf > 0) return '❌ Failed';
            if (nf > 0) return '⚠️ Warning';
            return '✅ Passed';
          }
          const criticalSlaStatus = slaStatus(criticalSla, criticalSlaNoFix);
          const highSlaStatus = slaStatus(highSla, highSlaNoFix);
          const mediumSlaStatus = slaStatus(mediumSla, mediumSlaNoFix);
          const lowSlaStatus = slaStatus(lowSla, lowSlaNoFix);

          comment += `| 🔴 Critical | ${criticalSla} | ${criticalSlaNoFix} | ${slaCriticalWithFix} / ${slaCriticalNoFix} days | ${criticalSlaStatus} |\n`;
          comment += `| 🟠 High | ${highSla} | ${highSlaNoFix} | ${slaHighWithFix} / ${slaHighNoFix} days | ${highSlaStatus} |\n`;
          comment += `| 🟡 Medium | ${mediumSla} | ${mediumSlaNoFix} | ${slaMediumWithFix} / ${slaMediumNoFix} days | ${mediumSlaStatus} |\n`;
          comment += `| 🔵 Low | ${lowSla} | ${lowSlaNoFix} | ${slaLowWithFix} / ${slaLowNoFix} days | ${lowSlaStatus} |\n\n`;

          if (totalSlaBreaches > 0) {
            function addVulnerabilityDetails(severityName, icon, details, threshold) {
              if (!details || details.trim() === '') return;
              
              const vulns = details.split(';;').filter(v => v.trim());
              if (vulns.length === 0) return;
              
              comment += `### ${icon} ${severityName} Severity - SLA Breached Issues (with fixes)\n\n`;
              comment += `Showing ${vulns.length} issue(s) that have exceeded the ${threshold}-day SLA threshold:\n\n`;
              
              vulns.forEach((vuln, idx) => {
                const parts = vuln.split('|');
                if (parts.length >= 6) {
                  const [id, title, pkg, daysAgo, cvssScore, cve] = parts;
                  comment += `${idx + 1}. **${title}**\n`;
                  comment += `   - ID: \`${id}\`\n`;
                  comment += `   - Package: \`${pkg}\`\n`;
                  comment += `   - Published: ${daysAgo} days ago (SLA: ${threshold} days)\n`;
                  if (cvssScore && cvssScore !== '0') {
                    comment += `   - CVSS Score: ${cvssScore}\n`;
                  }
                  if (cve && cve !== 'N/A') {
                    comment += `   - CVE: ${cve}\n`;
                  }
                  comment += '\n';
                }
              });
            }

            addVulnerabilityDetails('Critical', '🔴', process.env.critical_sla_details || '', slaCriticalWithFix);
            addVulnerabilityDetails('High', '🟠', process.env.high_sla_details || '', slaHighWithFix);
            addVulnerabilityDetails('Medium', '🟡', process.env.medium_sla_details || '', slaMediumWithFix);
            addVulnerabilityDetails('Low', '🔵', process.env.low_sla_details || '', slaLowWithFix);
          }

          if (parseInt(criticalNoFix) > 0 || parseInt(highNoFix) > 0 || parseInt(mediumNoFix) > 0 || parseInt(lowNoFix) > 0) {
            comment += '### ℹ️ Vulnerabilities Without Available Fixes (Informational Only)\n\n';
            comment += 'The following vulnerabilities were detected but **do not have fixes available** (no upgrade or patch). These are excluded from failure thresholds:\n\n';
            comment += `- Critical without fixes: **${criticalNoFix}**\n`;
            comment += `- High without fixes: **${highNoFix}**\n`;
            comment += `- Medium without fixes: **${mediumNoFix}**\n`;
            comment += `- Low without fixes: **${lowNoFix}**\n\n`;
          }

          // Final status
          if (failBuild === 'true') {
            comment += '❌ BUILD FAILED - Security checks failed\n\n';
            comment += 'Please review and fix the security vulnerabilities before merging.\n';
          } else if (warnBuild === 'true') {
            comment += '⚠️ BUILD PASSED WITH WARNINGS - SLA breaches detected for issues without available fixes\n\n';
            comment += 'Consider reviewing these vulnerabilities when fixes become available.\n';
          } else {
            comment += '✅ BUILD PASSED - All security checks passed\n\n';
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
